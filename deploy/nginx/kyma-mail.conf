upstream kyma_mail_backend {
  server 127.0.0.1:3333;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name kymamail.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name kymamail.com;

  # Replace with your real certificate paths.
#  ssl_certificate /etc/letsencrypt/live/kymamail.com/fullchain.pem;
#  ssl_certificate_key /etc/letsencrypt/live/kymamail.com/privkey.pem;

  # Frontend deployment target: the content of dist/email-client/browser
  root /home/applications/kymamail/frontend/current;
  index index.html;

  client_max_body_size 25m;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer always;

  # Frontend assets + Angular client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # NestJS API. Keep the /api prefix because the backend routes already use it.
  location /api/ {
    proxy_pass http://kyma_mail_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  # Service worker and manifest should not be cached aggressively.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
  }

  location = /ngsw.json {
    add_header Cache-Control "no-cache";
  }

  location = /ngsw-worker.js {
    add_header Cache-Control "no-cache";
  }
}
