<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration d'un bureau avec un ordinateur portable">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#e8ded0"/>
    </linearGradient>
    <linearGradient id="deskGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2ece3"/>
    </linearGradient>
    <linearGradient id="laptopLid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9d9dd"/>
      <stop offset="100%" stop-color="#b4b5ba"/>
    </linearGradient>
    <linearGradient id="laptopBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8c9ce"/>
      <stop offset="100%" stop-color="#a0a2a7"/>
    </linearGradient>
    <linearGradient id="leatherPad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d98b52"/>
      <stop offset="100%" stop-color="#a45a2d"/>
    </linearGradient>
    <linearGradient id="walletGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2f3440"/>
      <stop offset="100%" stop-color="#1a1d25"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Desk background -->
  <rect width="800" height="1000" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="800" height="1000" fill="url(#deskGradient)" opacity="0.9"/>

  <!-- Wooden trim at bottom -->
  <rect x="0" y="880" width="800" height="120" fill="#c79a66"/>
  <rect x="0" y="880" width="800" height="8" fill="#a87a49"/>

  <!-- Monitor stand (top) -->
  <ellipse cx="220" cy="180" rx="140" ry="14" fill="url(#shadow)"/>
  <rect x="170" y="80" width="100" height="90" rx="6" fill="#1a1d25"/>
  <rect x="205" y="40" width="30" height="50" fill="#2a2d35"/>
  <rect x="180" y="28" width="80" height="18" rx="4" fill="#1a1d25"/>

  <!-- Notebook / magazine -->
  <g transform="rotate(-6 340 310)">
    <rect x="260" y="260" width="200" height="130" rx="6" fill="#ffffff" stroke="#e0d8c9" stroke-width="2"/>
    <text x="360" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="26" letter-spacing="8" fill="#1a1d25">CEREAL</text>
    <line x1="290" y1="345" x2="430" y2="345" stroke="#c0b6a2" stroke-width="1"/>
    <line x1="300" y1="358" x2="420" y2="358" stroke="#c0b6a2" stroke-width="1"/>
  </g>

  <!-- Leather laptop sleeve -->
  <g>
    <ellipse cx="480" cy="720" rx="320" ry="26" fill="url(#shadow)"/>
    <path d="M180 440 L720 440 Q760 440 755 480 L740 700 Q738 730 700 730 L220 730 Q182 730 180 700 L168 480 Q165 440 200 440 Z"
          fill="url(#leatherPad)" stroke="#7a3f1a" stroke-width="2"/>
    <path d="M200 455 L735 455 Q745 470 735 485 L720 700 Q715 715 695 715 L225 715 Q205 715 200 700 L185 485 Q175 470 185 455 Z"
          fill="none" stroke="#8a4a22" stroke-width="1.5" opacity="0.7"/>

    <!-- Laptop lid -->
    <rect x="230" y="470" width="490" height="260" rx="14" fill="url(#laptopLid)" stroke="#8b8c91" stroke-width="1.5"/>
    <!-- Apple-style circle logo placeholder -->
    <circle cx="475" cy="600" r="34" fill="#9c9ea4" opacity="0.55"/>
    <circle cx="475" cy="600" r="22" fill="#b8babf" opacity="0.55"/>
  </g>

  <!-- Wallet -->
  <g transform="rotate(-8 300 520)">
    <rect x="215" y="460" width="180" height="120" rx="8" fill="url(#walletGradient)"/>
    <rect x="225" y="475" width="80" height="50" rx="4" fill="#e4d7bd"/>
    <rect x="235" y="483" width="62" height="18" rx="2" fill="#c9b289"/>
    <text x="310" y="500" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#c9b289">VISA</text>
    <rect x="225" y="540" width="160" height="4" rx="2" fill="#3b4050"/>
  </g>

  <!-- Watch -->
  <g transform="translate(560 250)">
    <rect x="-30" y="-15" width="60" height="30" rx="6" fill="#1a1d25"/>
    <rect x="-34" y="-45" width="14" height="30" fill="#2a2d35"/>
    <rect x="-34" y="15" width="14" height="30" fill="#2a2d35"/>
    <rect x="20" y="-45" width="14" height="30" fill="#2a2d35"/>
    <rect x="20" y="15" width="14" height="30" fill="#2a2d35"/>
    <rect x="-20" y="-8" width="40" height="16" rx="2" fill="#0b0d14"/>
  </g>

  <!-- Keyboard -->
  <g transform="translate(120 790)">
    <rect x="0" y="0" width="560" height="90" rx="10" fill="#f5f1ea" stroke="#c9bfac" stroke-width="1.5"/>
    <g fill="#d9cfba">
      <rect x="10" y="10" width="40" height="22" rx="3"/>
      <rect x="58" y="10" width="40" height="22" rx="3"/>
      <rect x="106" y="10" width="40" height="22" rx="3"/>
      <rect x="154" y="10" width="40" height="22" rx="3"/>
      <rect x="202" y="10" width="40" height="22" rx="3"/>
      <rect x="250" y="10" width="40" height="22" rx="3"/>
      <rect x="298" y="10" width="40" height="22" rx="3"/>
      <rect x="346" y="10" width="40" height="22" rx="3"/>
      <rect x="394" y="10" width="40" height="22" rx="3"/>
      <rect x="442" y="10" width="40" height="22" rx="3"/>
      <rect x="490" y="10" width="60" height="22" rx="3"/>
      <rect x="10" y="40" width="40" height="22" rx="3"/>
      <rect x="58" y="40" width="40" height="22" rx="3"/>
      <rect x="106" y="40" width="40" height="22" rx="3"/>
      <rect x="154" y="40" width="40" height="22" rx="3"/>
      <rect x="202" y="40" width="40" height="22" rx="3"/>
      <rect x="250" y="40" width="40" height="22" rx="3"/>
      <rect x="298" y="40" width="40" height="22" rx="3"/>
      <rect x="346" y="40" width="40" height="22" rx="3"/>
      <rect x="394" y="40" width="40" height="22" rx="3"/>
      <rect x="442" y="40" width="40" height="22" rx="3"/>
      <rect x="490" y="40" width="60" height="22" rx="3"/>
      <rect x="120" y="70" width="320" height="12" rx="3"/>
    </g>
  </g>

  <!-- Mouse -->
  <g transform="translate(700 900)">
    <ellipse cx="0" cy="12" rx="46" ry="10" fill="url(#shadow)"/>
    <ellipse cx="0" cy="0" rx="40" ry="24" fill="#ffffff" stroke="#d7cdb9" stroke-width="1.5"/>
    <line x1="0" y1="-18" x2="0" y2="6" stroke="#d7cdb9" stroke-width="1.2"/>
  </g>

  <!-- Phone -->
  <g transform="rotate(12 760 870)">
    <rect x="720" y="800" width="70" height="140" rx="10" fill="#1a1d25"/>
    <rect x="728" y="808" width="54" height="124" rx="6" fill="#0b0d14"/>
  </g>
</svg>
