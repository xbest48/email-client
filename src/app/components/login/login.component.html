<div class="min-h-screen flex bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
  <!-- Left: form -->
  <div class="flex flex-col justify-center w-full lg:w-1/2 px-6 sm:px-12 lg:px-16 xl:px-24 py-12">
    <div class="mx-auto w-full max-w-sm">
      <img
        src="kyma-logo.png"
        alt="Kyma"
        class="h-10 w-auto mb-10 dark:hidden"
        width="512"
        height="275">
      <img
        src="kyma-logo-mode-sombre.png"
        alt="Kyma"
        class="h-10 w-auto mb-10 hidden dark:block"
        width="512"
        height="278">

      <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
        Sign in to your account
      </h1>
      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
        Not a member?
        <a routerLink="/register" class="font-semibold text-amber-600 hover:text-amber-500 dark:text-amber-400 dark:hover:text-amber-300">
          Start a 14 day free trial
        </a>
      </p>

      <form class="mt-10" (submit)="$event.preventDefault(); onSignIn()">
        <div class="mb-5">
          <label for="login-email" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
            Email address
          </label>
          <input
            id="login-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            (blur)="onEmailChange()"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-sm text-gray-900 dark:text-white
                   border border-gray-300 dark:border-gray-700
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                   placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
            required
            autocomplete="email">
        </div>

        <div class="mb-5">
          <label for="login-password" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
            Password
          </label>
          <input
            id="login-password"
            type="password"
            [(ngModel)]="password"
            name="password"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-sm text-gray-900 dark:text-white
                   border border-gray-300 dark:border-gray-700
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                   placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
            required
            autocomplete="current-password">
        </div>

        @if (requires2FA()) {
          <div class="mb-5">
            <label for="totp-code" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
              Code a 6 chiffres (2FA)
            </label>
            <input
              id="totp-code"
              type="text"
              [(ngModel)]="totpCode"
              name="totpCode"
              class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-sm text-gray-900 dark:text-white
                     border border-gray-300 dark:border-gray-700
                     focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                     placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
              placeholder="123456"
              required>
          </div>
        }

        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input
              id="remember-me"
              type="checkbox"
              [(ngModel)]="rememberMe"
              name="rememberMe"
              class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 text-amber-600
                     focus:ring-2 focus:ring-amber-500 bg-white dark:bg-gray-900">
            <span class="text-sm text-gray-700 dark:text-gray-300">Remember me</span>
          </label>
          <a href="#" class="text-sm font-semibold text-amber-600 hover:text-amber-500 dark:text-amber-400 dark:hover:text-amber-300">
            Forgot password?
          </a>
        </div>

        @if (auth.loginError()) {
          <div class="mb-4 p-3 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 rounded-md text-sm text-red-700 dark:text-red-300" role="alert">
            {{ auth.loginError() }}
          </div>
        }

        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                 bg-amber-500 hover:bg-amber-600 text-white font-semibold text-sm
                 rounded-md shadow-sm transition-colors
                 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2
                 dark:focus:ring-offset-gray-950
                 disabled:opacity-60 disabled:cursor-not-allowed"
          [disabled]="loading() || (!requires2FA() && (!email() || !password())) || (requires2FA() && !totpCode())">
          @if (loading()) {
            <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            <span>Connexion...</span>
          } @else {
            <span>{{ requires2FA() ? 'Verifier le code' : 'Sign in' }}</span>
          }
        </button>

        @if (!requires2FA()) {
          <button
            type="button"
            (click)="onPasskeySignIn()"
            class="mt-3 w-full flex items-center justify-center gap-2 px-4 py-2.5
                  bg-transparent hover:bg-gray-50 dark:hover:bg-gray-900 text-gray-800 dark:text-gray-200
                  font-medium text-sm rounded-md
                  border border-gray-300 dark:border-gray-700 transition-colors
                  focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2
                  dark:focus:ring-offset-gray-950
                  disabled:opacity-60 disabled:cursor-not-allowed"
            [disabled]="loading() || !email()">
            Se connecter avec Passkey
          </button>
        }
      </form>

      <div class="mt-10">
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="bg-white dark:bg-gray-950 px-3 text-gray-500 dark:text-gray-400">
              Or continue with
            </span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-3 gap-3">
          <button
            type="button"
            (click)="onOAuthSignIn('google')"
            class="flex items-center justify-center gap-2 px-3 py-2
                   rounded-md bg-white dark:bg-gray-900
                   border border-gray-300 dark:border-gray-700
                   text-sm font-medium text-gray-800 dark:text-gray-200
                   hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2
                   dark:focus:ring-offset-gray-950"
            aria-label="Se connecter avec Google">
            <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12 10.2v3.96h5.5c-.24 1.38-1.62 4.05-5.5 4.05-3.3 0-6-2.73-6-6.1s2.7-6.1 6-6.1c1.87 0 3.13.8 3.85 1.48l2.62-2.52C16.75 3.39 14.6 2.4 12 2.4 6.86 2.4 2.7 6.56 2.7 11.7s4.16 9.3 9.3 9.3c5.37 0 8.93-3.78 8.93-9.11 0-.61-.07-1.08-.16-1.55H12z"/>
              <path fill="#34A853" d="M3.53 7.55l3.14 2.3c.85-1.64 2.47-2.84 4.33-2.84 1.87 0 3.13.8 3.85 1.48l2.62-2.52C16.75 3.39 14.6 2.4 12 2.4 8.24 2.4 4.99 4.56 3.53 7.55z" opacity="0"/>
            </svg>
            <span>Google</span>
          </button>

          <button
            type="button"
            (click)="onOAuthSignIn('microsoft')"
            class="flex items-center justify-center gap-2 px-3 py-2
                   rounded-md bg-white dark:bg-gray-900
                   border border-gray-300 dark:border-gray-700
                   text-sm font-medium text-gray-800 dark:text-gray-200
                   hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2
                   dark:focus:ring-offset-gray-950"
            aria-label="Se connecter avec Microsoft">
            <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
              <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
              <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
              <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
            </svg>
            <span>Microsoft</span>
          </button>

          <button
            type="button"
            (click)="onOAuthSignIn('apple')"
            class="flex items-center justify-center gap-2 px-3 py-2
                   rounded-md bg-white dark:bg-gray-900
                   border border-gray-300 dark:border-gray-700
                   text-sm font-medium text-gray-800 dark:text-gray-200
                   hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2
                   dark:focus:ring-offset-gray-950"
            aria-label="Se connecter avec Apple">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M16.365 1.43c0 1.14-.42 2.22-1.14 3.03-.81.93-2.1 1.62-3.18 1.53-.12-1.08.39-2.22 1.08-3.03.78-.93 2.13-1.62 3.24-1.53zM20.7 17.4c-.57 1.26-.84 1.83-1.56 2.94-.99 1.53-2.4 3.45-4.14 3.45-1.56 0-1.95-1.02-4.05-1.02-2.1 0-2.55 1.05-4.11 1.05-1.74 0-3.06-1.74-4.05-3.27C.36 17.58-.18 12.3 2.43 9.48c1.26-1.38 3.24-2.25 5.16-2.25 1.95 0 3.18 1.08 4.8 1.08 1.56 0 2.52-1.08 4.8-1.08 1.71 0 3.51.93 4.8 2.52-4.23 2.31-3.54 8.34-1.29 7.65z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: illustration -->
  <div class="hidden lg:block lg:w-1/2 relative">
    <img
      src="login-illustration.svg"
      alt=""
      aria-hidden="true"
      class="absolute inset-0 h-full w-full object-cover">
  </div>
</div>
