<div class="min-h-screen flex bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
  <!-- Left: form -->
  <div class="flex flex-col justify-center w-full lg:w-1/2 px-6 sm:px-12 lg:px-16 xl:px-24 py-12">
    <div class="mx-auto w-full max-w-sm">
      <app-kyma-logo class="block w-full h-auto mb-10" aria-label="Kyma"></app-kyma-logo>

      <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
        Connectez-vous a votre compte
      </h1>
      <!-- <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
        Vous n'avez pas encore de compte ?
        <a routerLink="/register" class="font-semibold text-amber-600 hover:text-amber-500 dark:text-amber-400 dark:hover:text-amber-300">
          Demarrer un essai gratuit de 14 jours
        </a>
      </p> -->

      <form class="mt-10" (submit)="$event.preventDefault(); onSignIn()">
        <div class="mb-5">
          <label for="login-email" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
            Adresse e-mail
          </label>
          <input
            id="login-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            (blur)="onEmailChange()"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-base sm:text-sm text-gray-900 dark:text-white
                   border border-gray-300 dark:border-gray-700
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                   placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
            required
            autocomplete="email">
        </div>

        <div class="mb-5">
          <label for="login-password" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
            Mot de passe
          </label>
          <input
            id="login-password"
            type="password"
            [(ngModel)]="password"
            name="password"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-base sm:text-sm text-gray-900 dark:text-white
                   border border-gray-300 dark:border-gray-700
                   focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                   placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
            required
            autocomplete="current-password">
        </div>

        @if (requires2FA()) {
          <div class="mb-5">
            <label for="totp-code" class="block text-sm font-medium text-gray-900 dark:text-gray-200 mb-2">
              Code a 6 chiffres (2FA)
            </label>
            <input
              id="totp-code"
              type="text"
              [(ngModel)]="totpCode"
              name="totpCode"
              class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-2 text-base sm:text-sm text-gray-900 dark:text-white
                     border border-gray-300 dark:border-gray-700
                     focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500
                     placeholder:text-gray-400 dark:placeholder:text-gray-500 transition-colors"
              placeholder="123456"
              required>
          </div>
        }

        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input
              id="remember-me"
              type="checkbox"
              [(ngModel)]="rememberMe"
              name="rememberMe"
              class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 text-amber-600
                     focus:ring-2 focus:ring-amber-500 bg-white dark:bg-gray-900">
            <span class="text-sm text-gray-700 dark:text-gray-300">Se souvenir de moi</span>
          </label>
          <a href="#" class="text-sm font-semibold text-amber-600 hover:text-amber-500 dark:text-amber-400 dark:hover:text-amber-300">
            Mot de passe oublie ?
          </a>
        </div>

        @if (auth.loginError()) {
          <div class="mb-4 p-3 bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 rounded-md text-sm text-red-700 dark:text-red-300" role="alert">
            {{ auth.loginError() }}
          </div>
        }

        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                 bg-amber-500 hover:bg-amber-600 text-white font-semibold text-sm
                 rounded-md shadow-sm transition-colors
                 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2
                 dark:focus:ring-offset-gray-950
                 disabled:opacity-60 disabled:cursor-not-allowed"
          [disabled]="loading() || (!requires2FA() && (!email() || !password())) || (requires2FA() && !totpCode())">
          @if (loading()) {
            <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            <span>Connexion...</span>
          } @else {
            <span>{{ requires2FA() ? 'Verifier le code' : 'Se connecter' }}</span>
          }
        </button>

        @if (!requires2FA()) {
          <button
            type="button"
            (click)="onPasskeySignIn()"
            class="mt-3 w-full flex items-center justify-center gap-2 px-4 py-2.5
                  bg-transparent hover:bg-gray-50 dark:hover:bg-gray-900 text-gray-800 dark:text-gray-200
                  font-medium text-sm rounded-md
                  border border-gray-300 dark:border-gray-700 transition-colors
                  focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2
                  dark:focus:ring-offset-gray-950
                  disabled:opacity-60 disabled:cursor-not-allowed"
            [disabled]="loading()">
            Se connecter avec Passkey
          </button>
        }
      </form>

    </div>
  </div>

  <!-- Right: illustration -->
  <div class="hidden lg:block lg:w-1/2 relative">
    <img
      src="photo-bureau.avif"
      alt=""
      aria-hidden="true"
      class="absolute inset-0 h-full w-full object-cover">
  </div>
</div>
