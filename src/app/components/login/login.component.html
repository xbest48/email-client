<div class="min-h-screen bg-linear-to-br from-gray-50 to-gray-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 max-w-md w-full">
    <div class="text-center mb-8">
      <img src="logo.svg" alt="MailFlow" class="w-24 h-24 mx-auto mb-6" width="96" height="96">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">MailFlow</h1>
      <p class="text-gray-500">Client email rapide et moderne</p>
    </div>

    <form (submit)="$event.preventDefault(); onSignIn()">
      <!-- Email -->
      <div class="mb-4">
        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">Adresse email</label>
        <input
          id="login-email"
          type="email"
          [(ngModel)]="email"
          name="email"
          (blur)="onEmailChange()"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm
                 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400
                 transition-colors"
          placeholder="vous@exemple.com"
          required
          autocomplete="email">
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          id="login-password"
          type="password"
          [(ngModel)]="password"
          name="password"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm
                 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400
                 transition-colors"
          placeholder="Mot de passe"
          required
          autocomplete="current-password">
      </div>

      @if (requires2FA()) {
        <!-- TOTP Code -->
        <div class="mb-4">
          <label for="totp-code" class="block text-sm font-medium text-gray-700 mb-1">Code a 6 chiffres (2FA)</label>
          <input
            id="totp-code"
            type="text"
            [(ngModel)]="totpCode"
            name="totpCode"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm
                   focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:border-amber-400
                   transition-colors"
            placeholder="123456"
            required>
        </div>
      }

      <!-- Error message -->
      @if (auth.loginError()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700" role="alert">
          {{ auth.loginError() }}
        </div>
      }

      <!-- Submit -->
      <button
        type="submit"
        class="w-full flex items-center justify-center gap-2 px-6 py-3 mb-3
               bg-amber-500 hover:bg-amber-600 text-white font-semibold
               rounded-xl shadow-md hover:shadow-lg transition-all duration-200
               focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2
               disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="loading() || (!requires2FA() && (!email() || !password())) || (requires2FA() && !totpCode())">
        @if (loading()) {
          <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          Connexion...
        } @else {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          {{ requires2FA() ? 'Verifier le code' : 'Se connecter' }}
        }
      </button>

      @if (!requires2FA()) {
        <button
          type="button"
          (click)="onPasskeySignIn()"
          class="w-full flex items-center justify-center gap-2 px-6 py-3
                bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold
                rounded-xl transition-all duration-200
                focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2
                disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="loading() || !email()">
          Se connecter avec Passkey
        </button>
      }
    </form>

    <div class="mt-6 text-center">
      <a routerLink="/register" class="text-sm text-amber-600 hover:text-amber-700">Vous n'avez pas de compte ? S'inscrire</a>
    </div>
  </div>
</div>
