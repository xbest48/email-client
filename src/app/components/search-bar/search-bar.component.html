<div class="relative w-full max-w-2xl">
  <!-- Main search bar -->
  <form (submit)="onSearch($event)" class="relative" role="search">
    <label for="search-input" class="sr-only">Rechercher des emails</label>
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input
        id="search-input"
        type="search"
        [(ngModel)]="query"
        name="query"
        placeholder="Rechercher des emails..."
        class="w-full pl-10 pr-20 py-2.5 bg-gray-100 hover:bg-gray-200/70 focus:bg-white
               border border-transparent focus:border-gray-300
               rounded-xl text-sm text-gray-800 placeholder-gray-500
               transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-amber-400/50 focus:shadow-sm"
        autocomplete="off">

      <!-- Filter toggle button -->
      <button
        type="button"
        (click)="showFilters.set(!showFilters())"
        class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-gray-600
               rounded-lg hover:bg-gray-200 transition-colors
               focus:outline-none focus:ring-2 focus:ring-amber-400"
        [attr.aria-expanded]="showFilters()"
        aria-controls="advanced-filters"
        aria-label="Filtres avances">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
        </svg>
      </button>

      @if (query()) {
        <button
          type="button"
          (click)="clearSearch()"
          class="absolute right-10 top-1/2 -translate-y-1/2 p-1 text-gray-400 hover:text-gray-600
                 rounded-full hover:bg-gray-200 transition-colors
                 focus:outline-none focus:ring-2 focus:ring-amber-400"
          aria-label="Effacer la recherche">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      }
    </div>
  </form>

  <!-- Advanced filters dropdown -->
  @if (showFilters()) {
    <div
      id="advanced-filters"
      class="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-xl border border-gray-200
             p-4 z-50"
      role="region"
      aria-label="Filtres avances">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label for="filter-from" class="block text-xs font-medium text-gray-600 mb-1">De</label>
          <input id="filter-from" type="text" [(ngModel)]="filterFrom" name="filterFrom"
                 class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50"
                 placeholder="expediteur@email.com">
        </div>
        <div>
          <label for="filter-to" class="block text-xs font-medium text-gray-600 mb-1">A</label>
          <input id="filter-to" type="text" [(ngModel)]="filterTo" name="filterTo"
                 class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50"
                 placeholder="destinataire@email.com">
        </div>
        <div>
          <label for="filter-subject" class="block text-xs font-medium text-gray-600 mb-1">Objet</label>
          <input id="filter-subject" type="text" [(ngModel)]="filterSubject" name="filterSubject"
                 class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50"
                 placeholder="Mot-cle dans l'objet">
        </div>
        <div>
          <label for="filter-has" class="block text-xs font-medium text-gray-600 mb-1">Options</label>
          <div class="flex items-center gap-4 py-2">
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" [(ngModel)]="filterHasAttachment" name="filterHasAttachment"
                     class="rounded border-gray-300 text-amber-500 focus:ring-amber-400">
              Piece jointe
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" [(ngModel)]="filterUnread" name="filterUnread"
                     class="rounded border-gray-300 text-amber-500 focus:ring-amber-400">
              Non lu
            </label>
          </div>
        </div>
        <div>
          <label for="filter-after" class="block text-xs font-medium text-gray-600 mb-1">Apres le</label>
          <input id="filter-after" type="date" [(ngModel)]="filterAfter" name="filterAfter"
                 class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50">
        </div>
        <div>
          <label for="filter-before" class="block text-xs font-medium text-gray-600 mb-1">Avant le</label>
          <input id="filter-before" type="date" [(ngModel)]="filterBefore" name="filterBefore"
                 class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400/50">
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-4 pt-3 border-t border-gray-100">
        <button
          type="button"
          (click)="resetFilters()"
          class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100
                 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400">
          Reinitialiser
        </button>
        <button
          type="button"
          (click)="applyFilters()"
          class="px-4 py-2 text-sm bg-amber-500 text-white font-medium rounded-lg
                 hover:bg-amber-600 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2">
          Rechercher
        </button>
      </div>
    </div>
  }
</div>
